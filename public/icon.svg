<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 흰 배경 -->
  <circle cx="256" cy="256" r="256" fill="#ffffff"/>
  <!-- 나침반 외곽 원 -->
  <circle cx="256" cy="256" r="200" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="8"/>
  <!-- 북쪽 화살표 (빨강) -->
  <polygon points="256,80 234,260 256,242 278,260" fill="#E53935"/>
  <!-- 남쪽 화살표 (파랑) -->
  <polygon points="256,432 278,260 256,278 234,260" fill="#1E88E5"/>
  <!-- 중앙 원 -->
  <circle cx="256" cy="256" r="22" fill="#ffffff" stroke="#333" stroke-width="6"/>
  <circle cx="256" cy="256" r="8" fill="#333"/>
  <!-- 동서남북 눈금 -->
  <line x1="80" y1="256" x2="108" y2="256" stroke="#999" stroke-width="8" stroke-linecap="round"/>
  <line x1="404" y1="256" x2="432" y2="256" stroke="#999" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="80" x2="256" y2="108" stroke="#E53935" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="404" x2="256" y2="432" stroke="#1E88E5" stroke-width="8" stroke-linecap="round"/>
  <!-- N 텍스트 -->
  <text x="256" y="68" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="40" font-weight="800" fill="#E53935">N</text>
  <!-- S 텍스트 -->
  <text x="256" y="448" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#1E88E5">S</text>
  <!-- E 텍스트 -->
  <text x="448" y="256" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#999">E</text>
  <!-- W 텍스트 -->
  <text x="64" y="256" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#999">W</text>
</svg>
