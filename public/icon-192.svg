<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <circle cx="96" cy="96" r="96" fill="#ffffff"/>
  <circle cx="96" cy="96" r="75" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="3"/>
  <!-- 북쪽 화살표 (빨강) -->
  <polygon points="96,30 88,98 96,91 104,98" fill="#E53935"/>
  <!-- 남쪽 화살표 (파랑) -->
  <polygon points="96,162 104,98 96,105 88,98" fill="#1E88E5"/>
  <!-- 중앙 원 -->
  <circle cx="96" cy="96" r="8" fill="#ffffff" stroke="#333" stroke-width="3"/>
  <circle cx="96" cy="96" r="3" fill="#333"/>
  <!-- 눈금 -->
  <line x1="30" y1="96" x2="42" y2="96" stroke="#999" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="96" x2="162" y2="96" stroke="#999" stroke-width="3" stroke-linecap="round"/>
  <!-- N 텍스트 -->
  <text x="96" y="25" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="#E53935">N</text>
  <!-- S 텍스트 -->
  <text x="96" y="168" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1E88E5">S</text>
  <!-- E 텍스트 -->
  <text x="170" y="96" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#999">E</text>
  <!-- W 텍스트 -->
  <text x="22" y="96" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#999">W</text>
</svg>
